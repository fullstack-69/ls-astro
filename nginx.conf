events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Local CDN Cache Storage inside the container
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=cdn_cache:10m max_size=1g inactive=60m use_temp_path=off;

    # Explicitly define what makes a cache key unique
    proxy_cache_key "$scheme$request_method$host$request_uri";

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html; # mount dist/client here
        # Visual indicator for students to see CDN activity
        add_header X-Cache-Status $upstream_cache_status always;

        # Astro's hashed assets — filenames are content-hashed, so cache hard
        location /_astro/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # favicons live at the root of dist/client
        location = /favicon.svg {
            expires 30d;
        }

        location = /favicon.ico {
            expires 30d;
        }

        location /_server-islands/ {
            proxy_pass http://host.docker.internal:4321;

            proxy_cache cdn_cache;
            proxy_cache_bypass 1; # never serve this from cache
            proxy_no_cache 1; # never store this in cache

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Everything else → Astro SSR server (the "origin" you're caching)
        location / {
            proxy_pass http://host.docker.internal:4321;

            proxy_cache cdn_cache;
            proxy_cache_valid 200 10m;
            proxy_cache_use_stale error timeout updating;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}