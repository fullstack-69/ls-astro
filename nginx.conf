events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Local CDN Cache Storage inside the container
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=cdn_cache:10m max_size=1g inactive=60m use_temp_path=off;

    # Explicitly define what makes a cache key unique
    proxy_cache_key "$scheme$request_method$host$request_uri";

    server {
        listen 80;
        server_name localhost;

        # Visual indicator for students to see CDN activity
        add_header X-Cache-Status $upstream_cache_status;

        # 1. STATIC ASSETS: Simulating CDN asset storage
        location /static-assets/ {
            alias /usr/share/nginx/html/assets/;
            expires 30d; # This automatically handles the "public" Cache-Control header
        }

        # 2. ASTRO: Running locally on port 4321 (Simulating Cached Edge SSG/SSR)
        location / {
            proxy_pass http://host.docker.internal:4321;

            proxy_cache cdn_cache;
            proxy_cache_valid 200 10m;
            proxy_cache_use_stale error timeout updating;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}