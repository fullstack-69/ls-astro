project_name: astro
services:
  cdn-edge:
    image: nginx:alpine
    container_name: cdn-edge
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Optional: Create a local folder for shared images/assets to simulate CDN storage
      # - ./shared-assets:/usr/share/nginx/html/assets:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
